name: Deploy SnackSpot

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

concurrency:
  group: deploy-snackspot
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on:
      - self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 1
          clean: false

      - name: Verify Docker tooling
        run: |
          docker --version
          docker compose version

      - name: Run unit tests
        working-directory: apps/web
        run: |
          npm install -g pnpm@9.15.4 --quiet 2>/dev/null || true
          pnpm install --frozen-lockfile --silent
          pnpm test

      - name: Deploy stack
        run: docker compose up -d --build --remove-orphans

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show recent logs on failure
        if: failure()
        run: docker compose logs --tail=200
