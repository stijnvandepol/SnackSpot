name: Deploy SnackSpot

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

concurrency:
  group: deploy-snackspot
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on:
      - self-hosted
    timeout-minutes: 30

    defaults:
      run:
        working-directory: /action-runner/_work/SnackSpot/SnackSpot

    steps:
      - name: Pull latest changes
        run: git pull origin ${{ inputs.ref }}

      - name: Verify Docker tooling
        run: |
          docker --version
          docker compose version

      - name: Run unit tests
        run: |
          docker build \
            --target test \
            --progress=plain \
            --no-cache-filter test \
            -f apps/web/Dockerfile \
            .

      - name: Deploy stack
        run: docker compose up -d --build --remove-orphans

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show recent logs on failure
        if: failure()
        run: docker compose logs --tail=200
