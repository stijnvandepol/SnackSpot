name: CI — Pull Request Checks

on:
  pull_request:
    branches: [main]

# Cancel in-progress CI runs for the same PR branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ─── Job 1: Unit tests ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: localhost
      MINIO_ACCESS_KEY: placeholder-key
      MINIO_SECRET_KEY: placeholder-secret-key-min
      MINIO_BUCKET: snackspot
      MINIO_PUBLIC_URL: https://snackspot.online
      JWT_ACCESS_SECRET: placeholder-access-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: placeholder-refresh-secret-at-least-32-chars-long
      RESEND_API_KEY: re_placeholder_key
      RESEND_FROM_EMAIL: SnackSpot <noreply@snackspot.online>
      NEXT_PUBLIC_APP_URL: https://snackspot.online
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure pnpm for CI
        # Replace shamefully-hoist with node-linker=hoisted.
        # This gives each workspace package its own flat REAL node_modules
        # (no symlinks). prisma lands in packages/db/node_modules/,
        # tailwindcss lands in apps/web/node_modules/.
        run: sed -i 's/shamefully-hoist=true/node-linker=hoisted/' .npmrc

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts --prod=false

      - name: Generate Prisma client
        # Resolve Prisma via pnpm workspace scripts so CI is independent of node_modules layout.
        run: pnpm --filter @snackspot/db generate

      - name: Run unit tests
        run: pnpm --filter web test

  # ─── Job 2: Build verification ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      REDIS_URL: redis://localhost:6379
      MINIO_ENDPOINT: localhost
      MINIO_ACCESS_KEY: placeholder-key
      MINIO_SECRET_KEY: placeholder-secret-key-min
      MINIO_BUCKET: snackspot
      MINIO_PUBLIC_URL: https://snackspot.online
      JWT_ACCESS_SECRET: placeholder-access-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: placeholder-refresh-secret-at-least-32-chars-long
      RESEND_API_KEY: re_placeholder_key
      RESEND_FROM_EMAIL: SnackSpot <noreply@snackspot.online>
      NEXT_PUBLIC_APP_URL: https://snackspot.online
      NEXT_PUBLIC_MINIO_PUBLIC_URL: https://snackspot.online
      NEXT_PUBLIC_MINIO_BUCKET: snackspot
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Configure pnpm for CI
        run: sed -i 's/shamefully-hoist=true/node-linker=hoisted/' .npmrc

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts --prod=false

      - name: Debug — package locations after install
        run: |
          echo "=== .npmrc ==="
          cat .npmrc
          echo ""
          echo "=== tailwindcss locations ==="
          find . -name "package.json" -path "*/tailwindcss/package.json" ! -path "*/.git/*" 2>/dev/null | head -10 || echo "not found"
          echo ""
          echo "=== prisma locations ==="
          find . -path "*/prisma/build/index.js" ! -path "*/.git/*" 2>/dev/null | head -5 || echo "not found"
          echo ""
          echo "=== require.resolve test from apps/web ==="
          node -e "
            const path = require('path');
            const dir = path.resolve('apps/web');
            ['tailwindcss','postcss','autoprefixer'].forEach(pkg => {
              try { console.log(pkg + ': FOUND at ' + require.resolve(pkg, { paths: [dir] })); }
              catch(e) { console.log(pkg + ': MISSING'); }
            });
          "

      - name: Generate Prisma client
        run: pnpm --filter @snackspot/db generate

      - name: Build web app
        run: pnpm --filter web build

      - name: Build worker
        run: pnpm --filter worker build

      - name: Build admin app
        run: pnpm --filter @snackspot/admin build

  # ─── Job 3: SAST (Semgrep) ───────────────────────────────────────────────────
  sast:
    name: SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/jwt
            p/nextjs

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
