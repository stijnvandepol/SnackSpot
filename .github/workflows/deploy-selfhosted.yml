name: Deploy SnackSpot (Self-Hosted)

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/**'
      - '.github/workflows/deploy-selfhosted.yml'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'tsconfig.base.json'
  workflow_dispatch:

concurrency:
  group: snackspot-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 45

    env:
      COMPOSE_FILE: infra/docker/docker-compose.yml

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate Docker availability
        shell: bash
        run: |
          docker version
          docker compose version

      - name: Write environment file
        shell: bash
        run: |
          if [ -n "${{ secrets.SNACKSPOT_ENV_FILE }}" ]; then
            printf '%s' "${{ secrets.SNACKSPOT_ENV_FILE }}" > .env
            echo "Wrote .env from GitHub secret SNACKSPOT_ENV_FILE"
            exit 0
          fi

          if [ -f .env ] && [ -s .env ]; then
            echo "SNACKSPOT_ENV_FILE missing; using existing .env on runner workspace"
            exit 0
          fi

          echo "GitHub secret SNACKSPOT_ENV_FILE is missing and no .env file exists in workspace."
          echo "Add repository secret SNACKSPOT_ENV_FILE or create a .env on the runner."
          exit 1

      - name: Build and start stack
        shell: bash
        run: |
          docker compose --env-file .env -f "$COMPOSE_FILE" pull
          docker compose --env-file .env -f "$COMPOSE_FILE" build --pull
          docker compose --env-file .env -f "$COMPOSE_FILE" up -d --remove-orphans

      - name: Wait for PostgreSQL readiness
        shell: bash
        run: |
          max_attempts=30
          delay_seconds=2
          for i in $(seq 1 "$max_attempts"); do
            if docker compose --env-file .env -f "$COMPOSE_FILE" exec -T postgres pg_isready -U snackspot -d snackspot >/dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            sleep "$delay_seconds"
          done
          echo "Postgres did not become ready in time."
          docker compose --env-file .env -f "$COMPOSE_FILE" logs postgres | tail -n 100
          exit 1

      - name: Run database migrations
        shell: bash
        run: |
          max_attempts=5
          delay_seconds=3
          for i in $(seq 1 "$max_attempts"); do
            if docker compose --env-file .env -f "$COMPOSE_FILE" run --rm api pnpm --filter @snackspot/db migrate; then
              echo "Migrations completed."
              exit 0
            fi
            echo "Migration attempt $i failed, retrying..."
            sleep "$delay_seconds"
          done
          echo "Migrations failed after retries."
          exit 1

      - name: Verify API health
        shell: bash
        run: |
          max_attempts=20
          delay_seconds=3
          for i in $(seq 1 "$max_attempts"); do
            if curl -fsS "http://localhost:4000/health" >/dev/null; then
              echo "API is healthy."
              exit 0
            fi
            sleep "$delay_seconds"
          done
          echo "API health check failed after multiple attempts."
          exit 1

      - name: Cleanup dangling images
        shell: bash
        run: |
          docker image prune -f
