name: CD — Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (branch, tag, or commit SHA)
        required: false
        default: main
        type: string

concurrency:
  group: cd-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on:
      - self-hosted
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 1
          clean: false

      - name: Verify Docker tooling
        run: |
          docker --version
          docker compose version

      - name: Deploy stack
        run: docker compose up -d --build --force-recreate --remove-orphans

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show recent logs on failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Prune build cache
        if: success()
        run: docker builder prune -f
