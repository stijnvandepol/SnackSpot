upstream web {
    server web:3000;
}

upstream minio {
    server minio:9000;
}

# Main app — snackspot.online (+ catch-all voor LAN-toegang via IP)
server {
    listen 80 default_server;
    server_name snackspot.online _;

    client_max_body_size 12M;

    # MinIO variant-afbeeldingen — publiek leesbaar, lang cacheable
    location ~* ^/snackspot/variants/ {
        proxy_pass         http://minio;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    # MinIO bucket — presigned PUT-uploads + overige bucket-toegang
    location /snackspot/ {
        proxy_pass         http://minio;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # Next.js web-applicatie
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

