upstream web {
    server web:3000;
}

upstream minio {
    server minio:9000;
}

# Only allow WebSocket upgrades — mitigates h2c smuggling
map $http_upgrade $connection_upgrade {
    websocket   upgrade;
    default     close;
}

# Docker DNS — nodig voor het dynamisch resolven van replicas
resolver 127.0.0.11 valid=10s ipv6=off;

# Rate-limit zones — ruime limieten zodat normaal gebruik nooit geraakt wordt.
# Alleen automated attacks / brute-force worden geblokkeerd.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Proxy cache zones
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=5m;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=200m inactive=60m;

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
gzip_min_length 1000;
gzip_vary on;

# Main app — snackspot.online (+ catch-all voor LAN-toegang via IP)
server {
    listen 80 default_server;
    server_name snackspot.online _;

    client_max_body_size 12M;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Auth endpoints — striktere rate limit ─────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── Cacheable API endpoints — korte cache voor semi-statische data ─
    location ~ ^/api/v1/(discover|places/featured|feed|badges) {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;

        proxy_cache            api_cache;
        proxy_cache_valid      200 30s;
        proxy_cache_use_stale  error timeout updating;
        proxy_cache_lock       on;
        add_header             X-Cache-Status $upstream_cache_status;

        # Override Next.js RSC Vary headers so Cloudflare can cache JSON responses.
        more_set_headers "Vary: Accept, Origin";

        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # ── API endpoints — ruime rate limit ──────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }

    # MinIO variant-afbeeldingen — publiek leesbaar, lang cacheable
    location ~* ^/snackspot/variants/ {
        proxy_pass         http://minio;
        proxy_set_header   Host minio:9000;
        proxy_buffering    off;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    # MinIO bucket — presigned PUT-uploads + overige bucket-toegang
    location /snackspot/ {
        proxy_pass         http://minio;
        proxy_set_header   Host minio:9000;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # ── Next.js static assets — immutable, lang cacheable ────────────
    location /_next/static/ {
        proxy_pass         http://web;
        proxy_cache        static_cache;
        proxy_cache_valid  200 365d;
        add_header         Cache-Control "public, immutable";
    }

    # Next.js web-applicatie
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1; # nosemgrep: generic.nginx.security.possible-h2c-smuggling.possible-nginx-h2c-smuggling
        # Map above restricts $http_upgrade to "websocket" only; all other values get Connection: close.
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host; # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}
