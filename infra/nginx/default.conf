upstream web {
    server web:3000;
}

upstream minio {
    server minio:9000;
}

# Rate-limit zones — ruime limieten zodat normaal gebruik nooit geraakt wordt.
# Alleen automated attacks / brute-force worden geblokkeerd.
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# Main app — snackspot.online (+ catch-all voor LAN-toegang via IP)
server {
    listen 80 default_server;
    server_name snackspot.online _;

    client_max_body_size 12M;

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Auth endpoints — striktere rate limit ─────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── API endpoints — ruime rate limit ──────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # MinIO variant-afbeeldingen — publiek leesbaar, lang cacheable
    location ~* ^/snackspot/variants/ {
        proxy_pass         http://minio;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    # MinIO bucket — presigned PUT-uploads + overige bucket-toegang
    location /snackspot/ {
        proxy_pass         http://minio;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
    }

    # Next.js web-applicatie
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
