services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "4000:4000"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: snackspot
      POSTGRES_PASSWORD: snackspot
      POSTGRES_DB: snackspot
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio' ; sleep 2; done;
      /usr/bin/mc mb local/snackspot-media --ignore-existing;
      /usr/bin/mc anonymous set download local/snackspot-media;
      exit 0;
      "

volumes:
  pg_data:
  minio_data:
