version: '3.9'

# ─── Shared env ───────────────────────────────────────────────────────────────
x-common-env: &common-env
  DATABASE_URL: ${DATABASE_URL:-postgresql://snackspot:snackspot@db:5432/snackspot}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
  MINIO_PORT: ${MINIO_PORT:-9000}
  MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
  MINIO_BUCKET: ${MINIO_BUCKET:-snackspot}
  MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}

services:

  # ─── PostgreSQL + PostGIS ──────────────────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: snackspot
      POSTGRES_USER: snackspot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snackspot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snackspot -d snackspot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [snackspot]

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [snackspot]

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [snackspot]

  # ─── Migration runner (one-shot) ──────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.migrate
    restart: on-failure
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://snackspot:snackspot@db:5432/snackspot}
    depends_on:
      db:
        condition: service_healthy
    networks: [snackspot]

  # ─── Next.js web app ──────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:8080}
        NEXT_PUBLIC_MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
        NEXT_PUBLIC_MINIO_BUCKET: ${MINIO_BUCKET:-snackspot}
    restart: unless-stopped
    ports:
      - "8080:3000"
    environment:
      <<: *common-env
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      MAX_FILE_SIZE_BYTES: ${MAX_FILE_SIZE_BYTES:-10485760}
      MAX_PHOTOS_PER_REVIEW: ${MAX_PHOTOS_PER_REVIEW:-5}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [snackspot]

  # ─── Image processing worker ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      <<: *common-env
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [snackspot]

networks:
  snackspot:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
